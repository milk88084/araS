name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  # Dummy DB URL so prisma generate works in CI without a real database
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-lint-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-lint-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-type-check-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-type-check-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: apps/web/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/web/prisma/schema.prisma') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm turbo run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-build-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: apps/web/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/web/prisma/schema.prisma') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm turbo run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: true

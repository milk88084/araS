<h2>Popup 裡面要顯示什麼內容？</h2>
<p class="subtitle">以「目標總額」為例，比較兩種內容層次</p>

<div class="split">

  <!-- Option A: Text only -->
  <div class="mockup" style="cursor:pointer;" data-choice="a" onclick="toggleSelect(this)">
    <div class="mockup-header">A — 文字說明</div>
    <div class="mockup-body" style="background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; min-height: 260px; border-radius: 0 0 8px 8px;">
      <div style="background: white; border-radius: 16px; padding: 20px; width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
        <!-- Title row -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
          <div>
            <div style="font-size: 11px; color: #8e8e93; margin-bottom: 2px;">計算說明</div>
            <div style="font-size: 15px; font-weight: 700; color: #1c1c1e;">目標總額</div>
          </div>
          <div style="font-size: 18px; color: #d1d1d6; cursor: pointer;">×</div>
        </div>
        <!-- Description -->
        <div style="font-size: 12px; color: #3c3c43; line-height: 1.7;">
          依據 <strong>SWR 法則</strong>，退休時需累積的總資產金額。<br><br>
          計算方式：先以通膨率調整退休後每月支出，扣除政府退休金後，得出每年需自行提領的金額，再除以安全提領率。
        </div>
        <!-- Close -->
        <div style="margin-top: 16px; text-align: center;">
          <div style="display: inline-block; background: #007aff; color: white; font-size: 12px; border-radius: 8px; padding: 6px 20px;">了解了</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Option B: Text + formula with live values -->
  <div class="mockup" style="cursor:pointer;" data-choice="b" onclick="toggleSelect(this)">
    <div class="mockup-header">B — 說明 ＋ 公式與實際數值</div>
    <div class="mockup-body" style="background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; min-height: 260px; border-radius: 0 0 8px 8px;">
      <div style="background: white; border-radius: 16px; padding: 20px; width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
        <!-- Title row -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
          <div>
            <div style="font-size: 11px; color: #8e8e93; margin-bottom: 2px;">計算說明</div>
            <div style="font-size: 15px; font-weight: 700; color: #1c1c1e;">目標總額</div>
          </div>
          <div style="font-size: 18px; color: #d1d1d6; cursor: pointer;">×</div>
        </div>
        <!-- Short desc -->
        <div style="font-size: 12px; color: #3c3c43; line-height: 1.6; margin-bottom: 10px;">
          依 SWR 法則，退休後每年需提領的金額除以安全提領率。
        </div>
        <!-- Formula block -->
        <div style="background: #f2f2f7; border-radius: 10px; padding: 10px; font-size: 11px; color: #1c1c1e; line-height: 1.8;">
          <div style="color: #8e8e93; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">公式</div>
          <div>年提領額 ÷ SWR%</div>
          <div style="border-top: 1px solid #e5e5ea; margin: 6px 0;"></div>
          <div style="color: #8e8e93; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">你的數值</div>
          <div><span style="color: #8e8e93;">月支出（通膨後）</span> <span style="float:right; font-weight:600;">NT$ 5.8萬</span></div>
          <div><span style="color: #8e8e93;">− 政府退休金</span> <span style="float:right; font-weight:600;">NT$ 1.5萬</span></div>
          <div><span style="color: #8e8e93;">× 12 ÷ 4% SWR</span></div>
          <div style="border-top: 1px solid #e5e5ea; margin: 6px 0;"></div>
          <div style="font-weight: 700; color: #1c1c1e;"><span>目標</span><span style="float:right;">NT$ 1,260萬</span></div>
        </div>
        <!-- Close -->
        <div style="margin-top: 12px; text-align: center;">
          <div style="display: inline-block; background: #007aff; color: white; font-size: 12px; border-radius: 8px; padding: 6px 20px;">了解了</div>
        </div>
      </div>
    </div>
  </div>

</div>

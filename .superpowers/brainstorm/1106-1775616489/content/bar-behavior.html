<h2>左側比例條的新行為</h2>
<p class="subtitle">確認展開/收合時的高度邏輯</p>

<div class="section">
  <div class="split">
    <div class="mockup">
      <div class="mockup-header">收合狀態（全部 1:1）</div>
      <div class="mockup-body">
        <div style="display:flex;gap:10px;height:280px">
          <!-- Left bar -->
          <div style="display:flex;flex-direction:column;gap:6px;width:40px">
            <div style="background:#34c759;border-radius:0 12px 12px 0;flex:1;min-height:44px"></div>
            <div style="background:#007aff;border-radius:0 12px 12px 0;flex:1;min-height:44px"></div>
            <div style="background:#5856d6;border-radius:0 12px 12px 0;flex:1;min-height:44px"></div>
          </div>
          <!-- Cards -->
          <div style="display:flex;flex-direction:column;gap:6px;flex:1">
            <div style="background:#f2f2f7;border-radius:12px;flex:1;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700">流動資金</div>
              <div style="font-size:11px;color:#8e8e93">現金, 活存</div>
            </div>
            <div style="background:#f2f2f7;border-radius:12px;flex:1;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700">投資</div>
              <div style="font-size:11px;color:#8e8e93">元大台灣50</div>
            </div>
            <div style="background:#f2f2f7;border-radius:12px;flex:1;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700">負債</div>
              <div style="font-size:11px;color:#8e8e93">信用卡</div>
            </div>
          </div>
        </div>
        <p style="font-size:11px;color:#8e8e93;margin-top:8px">每個色塊高度相同（flexGrow: 1）</p>
      </div>
    </div>

    <div class="mockup">
      <div class="mockup-header">展開「投資」（有 3 個子項目）</div>
      <div class="mockup-body">
        <div style="display:flex;gap:10px;height:280px">
          <!-- Left bar -->
          <div style="display:flex;flex-direction:column;gap:6px;width:40px">
            <div style="background:#34c759;border-radius:0 12px 12px 0;flex:1;min-height:44px"></div>
            <div style="background:#007aff;border-radius:0 12px 12px 0;flex:3;min-height:44px"></div>
            <div style="background:#5856d6;border-radius:0 12px 12px 0;flex:1;min-height:44px"></div>
          </div>
          <!-- Cards -->
          <div style="display:flex;flex-direction:column;gap:6px;flex:1">
            <div style="background:#f2f2f7;border-radius:12px;flex:1;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700">流動資金</div>
              <div style="font-size:11px;color:#8e8e93">現金, 活存</div>
            </div>
            <!-- Expanded card -->
            <div style="background:#007aff;border-radius:12px;flex:3;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700;color:white">投資</div>
              <div style="margin-top:6px;display:flex;flex-direction:column;gap:4px">
                <div style="background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 8px;font-size:11px;color:white">元大台灣50</div>
                <div style="background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 8px;font-size:11px;color:white">0050</div>
                <div style="background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 8px;font-size:11px;color:white">美股</div>
              </div>
            </div>
            <div style="background:#f2f2f7;border-radius:12px;flex:1;min-height:44px;padding:8px 10px">
              <div style="font-size:13px;font-weight:700">負債</div>
              <div style="font-size:11px;color:#8e8e93">信用卡</div>
            </div>
          </div>
        </div>
        <p style="font-size:11px;color:#8e8e93;margin-top:8px">展開的色塊 flexGrow = 子項目數量（3）</p>
      </div>
    </div>
  </div>
</div>
